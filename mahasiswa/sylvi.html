<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Data Diri</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            text-align: center;
        }

        table{
            border-collapse: collapse;
            margin: 20px auto;
            width: 800px;
        }

        td{
            border: 1px solid black;
            height: 80px;
            text-align: center;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <h1>HTML Table</h1>

    <table>
        <tr>
            <td colspan="2">Cell 1</td>
            <td>Cell 2</td>
            <td>Cell 3</td>
        </tr>

        <tr>
            <td rowspan="3">Cell 4</td>
            <td>Cell 5</td>
            <td>Cell 6</td>
            <td>Cell 7</td>
        </tr>

        <tr>
            <td colspan="3">Cell 8</td>
        </tr>

        <tr>
            <td>Cell 9</td>
            <td colspan="2">Cell 10</td>
        </tr>

    </table>

</body>
</html>
